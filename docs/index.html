<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Democracy Pulse — GST Index</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 700px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2.5rem;
            font-style: italic;
        }
        .pillars {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .pillar {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 1.2rem 1rem;
            width: 180px;
            text-align: center;
        }
        .pillar .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 0.4rem;
        }
        .pillar .name {
            font-size: 0.95rem;
            color: #ccc;
            line-height: 1.3;
        }
        .status {
            font-size: 0.85rem;
            color: #555;
            margin-top: 2rem;
        }
        .status span {
            color: #4a9;
        }
        a { color: #4a9; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DEMOCRACY PULSE</h1>
        <div class="subtitle">Rooted Freedom Index — Grand Social Theory</div>

        <div class="pillars">
            <div class="pillar">
                <div class="label">Pillar I</div>
                <div class="name">Integrated Will</div>
            </div>
            <div class="pillar">
                <div class="label">Pillar II</div>
                <div class="name">Organic Ties</div>
            </div>
            <div class="pillar">
                <div class="label">Pillar III</div>
                <div class="name">Social Capital Transformation</div>
            </div>
        </div>

        <div class="status">
            <span>🚧 Under Construction</span> — Building theoretical foundation &amp; data pipeline<br><br>
            <a href="https://github.com/alprnkmbr/democracy">GitHub Repository</a>
        </div>
    </div>
</body>
</html>
